name: Terraform GCP - Env

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        required: true
        options:
          - dev
          - stg
          - prod
      action:
        description: "Terraform action"
        type: choice
        required: true
        options:
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

jobs:
  terraform_env:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_enable_composer: "false"

      TF_VAR_bootstrap_project_id: ${{ secrets.TF_VAR_BOOTSTRAP_PROJECT_ID }}
      TF_VAR_org_id: ${{ secrets.TF_VAR_ORG_ID }}
      TF_VAR_billing_account_id: ${{ secrets.TF_VAR_BILLING_ACCOUNT_ID }}

      TFSTATE_BUCKET: "tfstate-bootstrap-project-487710"
      TF_VAR_ci_service_account_email: ${{ secrets.GCP_TERRAFORM_SA }}

      TF_VAR_snowflake_account: ${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}-${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}
      TF_VAR_snowflake_user: ${{ vars.SNOWFLAKE_USERNAME }}
      TF_VAR_snowflake_password: ${{ secrets.SVC_DBT_PASSWORD }}
      TF_VAR_snowflake_role: ${{ vars.SNOWFLAKE_ROLE }}
      TF_VAR_snowflake_warehouse: ${{ vars.SNOWFLAKE_WAREHOUSE }}
      TF_VAR_snowflake_database: ${{ vars.SNOWFLAKE_DATABASE }}
      TF_VAR_snowflake_schema: ${{ vars.SNOWFLAKE_SCHEMA }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Authenticate to GCP via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - name: Select env directory
        id: sel
        run: |
          ENV="${{ github.event.inputs.environment }}"
          echo "dir=terraform/gcp/env/$ENV" >> "$GITHUB_OUTPUT"
          echo "prefix=gcp/env/$ENV" >> "$GITHUB_OUTPUT"

      - name: Safety check for destroy on prod
        if: github.event.inputs.action == 'destroy' && github.event.inputs.environment == 'prod'
        run: |
          echo "Destroy on prod is blocked by this workflow."
          exit 1

      - name: Debug TF vars presence
        run: |
          [ -n "${TF_VAR_bootstrap_project_id}" ] && echo "bootstrap project OK" || echo "bootstrap project MISSING"
          [ -n "${TF_VAR_org_id}" ] && echo "org_id OK" || echo "org_id MISSING"
          [ -n "${TF_VAR_billing_account_id}" ] && echo "billing_account_id OK" || echo "billing_account_id MISSING"
          [ -n "${TF_VAR_ci_service_account_email}" ] && echo "ci_service_account_email OK" || echo "ci_service_account_email MISSING"

          [ -n "${TF_VAR_snowflake_account}" ] && echo "snowflake_account OK" || echo "snowflake_account MISSING"
          [ -n "${TF_VAR_snowflake_user}" ] && echo "snowflake_user OK" || echo "snowflake_user MISSING"
          [ -n "${TF_VAR_snowflake_password}" ] && echo "snowflake_password OK" || echo "snowflake_password MISSING"
          [ -n "${TF_VAR_snowflake_role}" ] && echo "snowflake_role OK" || echo "snowflake_role MISSING"
          [ -n "${TF_VAR_snowflake_warehouse}" ] && echo "snowflake_warehouse OK" || echo "snowflake_warehouse MISSING"
          [ -n "${TF_VAR_snowflake_database}" ] && echo "snowflake_database OK" || echo "snowflake_database MISSING"
          [ -n "${TF_VAR_snowflake_schema}" ] && echo "snowflake_schema OK" || echo "snowflake_schema MISSING"

      - name: Terraform init
        run: |
          terraform -chdir=${{ steps.sel.outputs.dir }} init \
            -backend-config="bucket=${TFSTATE_BUCKET}" \
            -backend-config="prefix=${{ steps.sel.outputs.prefix }}"

      - name: Terraform validate
        if: github.event.inputs.action == 'apply'
        run: terraform -chdir=${{ steps.sel.outputs.dir }} validate

      - name: Terraform state list
        run: terraform -chdir=${{ steps.sel.outputs.dir }} state list || true

      - name: Terraform plan
        if: github.event.inputs.action == 'apply'
        run: terraform -chdir=${{ steps.sel.outputs.dir }} plan -out=tfplan

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        run: terraform -chdir=${{ steps.sel.outputs.dir }} apply -auto-approve tfplan

      - name: Terraform destroy plan
        if: github.event.inputs.action == 'destroy'
        run: terraform -chdir=${{ steps.sel.outputs.dir }} plan -destroy -out=tfdestroy

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform -chdir=${{ steps.sel.outputs.dir }} apply -auto-approve tfdestroy